      - Weights
    bypass:
      - Inputs
      - Outputs
  - target: input_reg
    type: datatype
    keep:
      - Outputs
    bypass:
      - Weights
      - Inputs
  - target: weight_reg
    type: datatype
    keep:
      []
    bypass:
      - Weights
      - Inputs
      - Outputs
  - target: DRAM
    type: datatype
    keep:
      - Weights
      - Inputs
      - Outputs
    bypass:
      []
  - target: psum_reg
    type: temporal
    factors: R1 S1 P1 Q1 C12 K1 N1
