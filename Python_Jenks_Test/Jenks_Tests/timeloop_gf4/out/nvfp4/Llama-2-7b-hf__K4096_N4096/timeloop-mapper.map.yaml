  - target: input_reg
    type: temporal
    factors: R1 S1 P1 Q1 C4 K2 N1
    permutation: CKRSPQN
  - target: weight_reg
    type: temporal
    factors: R1 S1 P1 Q1 C8 K64 N4
    permutation: KCNRSPQ
  - target: global_buffer
    type: spatial
    factors: R1 S1 P1 Q1 C8 K8 N1
    permutation: KCRSPQN
    split: 1
  - target: global_buffer
    type: temporal
    factors: R1 S1 P1 Q1 C4 K1 N64
    permutation: NCRSPQK
  - target: DRAM
    type: temporal
    factors: R1 S1 P1 Q1 C4 K4 N2
    permutation: KCNRSPQ