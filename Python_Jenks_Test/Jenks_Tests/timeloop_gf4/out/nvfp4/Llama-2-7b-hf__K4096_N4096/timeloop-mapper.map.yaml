      - Outputs
    bypass:
      - Weights
      - Inputs
  - target: input_reg
    type: datatype
    keep:
      - Weights
      - Inputs
    bypass:
      - Outputs
  - target: weight_reg
    type: datatype
    keep:
      []
    bypass:
      - Weights
      - Inputs
      - Outputs
  - target: global_buffer
    type: datatype
    keep:
      - Weights
    bypass:
      - Inputs
      - Outputs
  - target: DRAM
    type: datatype
