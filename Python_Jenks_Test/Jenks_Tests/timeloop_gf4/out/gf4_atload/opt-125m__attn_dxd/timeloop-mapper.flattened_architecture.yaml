architecture:
    version: '0.4'
    local:
      - name: GF4_Engine_atload.chip.PE[0..255].weight_reg
        class: lut_regfile
        attributes:
            depth: 64
            width: 4
            datawidth: 4
            meshX: 16
            technology: "45nm"
            global_cycle_seconds: 1e-09
        area_scale: 1.0
        energy_scale: 1.0
      - name: GF4_Engine_atload.chip.PE[0..255].input_reg
        class: lut_regfile
        attributes:
            depth: 64
            width: 4
            datawidth: 4
            meshX: 16
            technology: "45nm"
            global_cycle_seconds: 1e-09
        area_scale: 1.0
        energy_scale: 1.0
      - name: GF4_Engine_atload.chip.PE[0..255].psum_reg
        class: regfile
        attributes:
            depth: 16
            width: 24
            word-bits: 24
            block-size: 1
            meshX: 16
            technology: "45nm"
            global_cycle_seconds: 1e-09
        area_scale: 1.0
        energy_scale: 1.0
      - name: GF4_Engine_atload.chip.PE[0..255].mac
        class: fp4_mac
        attributes:
            datawidth: 4
            meshX: 16
            technology: "45nm"
            global_cycle_seconds: 1e-09
        area_scale: 1.0
        energy_scale: 1.0
      - name: GF4_Engine_atload.chip.global_buffer
        class: SRAM
        attributes:
            depth: 16384
            width: 256
            block-size: 64
            word-bits: 4
            n_banks: 8
            read_bandwidth: 32
            write_bandwidth: 32
            technology: "45nm"
            global_cycle_seconds: 1e-09
        area_scale: 1.0
        energy_scale: 1.0
      - name: GF4_Engine_atload.DRAM
        class: DRAM
        attributes:
            type: "LPDDR4"
            width: 64
            block-size: 16
            word-bits: 4
            technology: "45nm"
            global_cycle_seconds: 1e-09
        area_scale: 1.0
        energy_scale: 1.0
