# GF4-Engine, DECODE-AT-LOAD variant.
# Same as gf4_engine.yaml but the LUT lives on the PE register-FILL path
# (weight_reg/input_reg = lut_regfile) instead of inside every MAC.  The MAC is
# the plain fp4_mac (no LUT).  This is the architecture our "LUT is nearly free"
# claim assumes; compare its LUT overhead vs nvfp4 against the naive gf4_engine.
architecture:
  version: 0.3
  subtree:
    - name: GF4_Engine_atload
      attributes:
        technology: "45nm"
      local:
        - name: DRAM
          class: DRAM
          attributes:
            type: "LPDDR4"
            width: 64
            block-size: 16
            word-bits: 4
      subtree:
        - name: chip
          local:
            - name: global_buffer
              class: SRAM
              attributes:
                depth: 16384
                width: 256
                block-size: 64
                word-bits: 4
                n_banks: 8
                read_bandwidth: 32
                write_bandwidth: 32
          subtree:
            - name: PE[0..255]
              local:
                - name: weight_reg
                  class: lut_regfile
                  attributes: { depth: 64, width: 4, datawidth: 4, meshX: 16 }
                - name: input_reg
                  class: lut_regfile
                  attributes: { depth: 64, width: 4, datawidth: 4, meshX: 16 }
                - name: psum_reg
                  class: regfile
                  attributes: { depth: 16, width: 24, word-bits: 24, block-size: 1, meshX: 16 }
                - name: mac
                  class: fp4_mac
                  attributes: { datawidth: 4, meshX: 16 }
