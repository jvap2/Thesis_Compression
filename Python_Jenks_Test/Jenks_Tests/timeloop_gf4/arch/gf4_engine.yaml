# GF4-Engine architecture (Timeloop v0.3 / Accelergy).
# 16x16 = 256-PE weight-stationary array (Eyeriss-class), each PE built on the
# lut_fp4_mac compound component (LUT-FP4 datapath).  DRAM -> global buffer ->
# per-PE register files -> LUT-FP4 MAC.  Operand storage is 4-bit (FP4 density).
#
# Microscale (per-16 E4M3 dequant) and the Hadamard FWHT pre-pass are NOT in
# this GEMM dataflow; they are added analytically in postprocess.py (each is a
# few % of energy, consistent with the Python roofline).
architecture:
  version: 0.3
  subtree:
    - name: GF4_Engine
      attributes:
        technology: "45nm"
      local:
        - name: DRAM
          class: DRAM
          attributes:
            type: "LPDDR4"
            width: 64
            block-size: 16          # 64b / 4b words
            word-bits: 4
      subtree:
        - name: chip
          local:
            - name: global_buffer
              class: SRAM
              attributes:
                depth: 16384        # 16K rows
                width: 256          # 256b/row
                block-size: 64      # 256/4
                word-bits: 4
                n_banks: 8
                read_bandwidth: 32
                write_bandwidth: 32
          subtree:
            - name: PE[0..255]
              local:
                - name: weight_reg
                  class: regfile
                  attributes: { depth: 64, width: 4, word-bits: 4, block-size: 1, meshX: 16 }
                - name: input_reg
                  class: regfile
                  attributes: { depth: 64, width: 4, word-bits: 4, block-size: 1, meshX: 16 }
                - name: psum_reg
                  class: regfile
                  attributes: { depth: 16, width: 24, word-bits: 24, block-size: 1, meshX: 16 }
                - name: mac
                  class: lut_fp4_mac
                  attributes: { datawidth: 4, lut_entries: 16, lut_width: 8, meshX: 16 }
