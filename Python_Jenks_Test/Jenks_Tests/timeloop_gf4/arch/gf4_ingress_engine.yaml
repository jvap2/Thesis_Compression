# GF4-Engine, DECODE-AT-CHIP-INGRESS variant.
# LUT on the global_buffer fill from DRAM (global_buffer = lut_sram); regfiles
# and MAC are plain.  Most aggressive amortization: one decode per operand at
# chip ingress, DRAM stays 4-bit.  Compare LUT overhead vs nvfp4 against
# gf4 (per-MAC) and gf4_atload (per-PE-fill).
architecture:
  version: 0.3
  subtree:
    - name: GF4_Engine_ingress
      attributes:
        technology: "45nm"
      local:
        - name: DRAM
          class: DRAM
          attributes:
            type: "LPDDR4"
            width: 64
            block-size: 16
            word-bits: 4
      subtree:
        - name: chip
          local:
            - name: global_buffer
              class: lut_sram
              attributes:
                depth: 16384
                width: 256
          subtree:
            - name: PE[0..255]
              local:
                - name: weight_reg
                  class: regfile
                  attributes: { depth: 64, width: 4, word-bits: 4, block-size: 1, meshX: 16 }
                - name: input_reg
                  class: regfile
                  attributes: { depth: 64, width: 4, word-bits: 4, block-size: 1, meshX: 16 }
                - name: psum_reg
                  class: regfile
                  attributes: { depth: 16, width: 24, word-bits: 24, block-size: 1, meshX: 16 }
                - name: mac
                  class: fp4_mac
                  attributes: { datawidth: 4, meshX: 16 }
